<!DOCTYPE html>
<html>
<head>
    <title>Access Page for Individual</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        form {
            max-width: 400px;
            margin: 0 auto;
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 8px;
        }
 
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #2a2a2a;
            color: white;
            border: none;
            border-radius: 6px;
        }
 
        button {
            width: 100%;
            padding: 12px;
            background-color: #ff9800;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
 
        .link {
            text-align: center;
            margin-top: 15px;
        }
 
        .link a {
            color: #ff9800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="alert">This is a alert</div>
    <div class="container">
        <!-- Logo -->
        <img src="{{ url_for('static', filename='RUCKUS-Networks-Logos-artwork_white-orange.png') }}" alt="Ruckus Logo" class="logo">
 
        <h1 style="text-align:center;">Individual Access</h1>
 
        <form id="signupForm" method="POST" action="/signup">
         
            <input type="text" name="username" placeholder="Username" required>
            <!-- <input type="password" name="password" placeholder="Password" required> -->
 
            <label for="role" style="color:white;">Register as:</label>
            <select name="role" required>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
 
             <label style="color:white;">Access Type:</label>
             <select name="access_type" required>
                 <option value="permanent">Permanent</option>
                 <option value="temporary">Temporary</option>
             </select><br>
 
         
            <button type="submit">Add</button>
 
            <!-- <div class="link">
                Already have an account? <a href="/">Log in</a>
            </div> -->
        </form>
    </div>

    <script>
        const form=document.getElementById("signupForm");

        const addButton = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent default form submission
            addButton.disabled = true;
            addButton.textContent = "Loading...";

            const formData = new FormData(form);
            const data = {
                role: formData.get('role'),
                username: formData.get('username'),
                access_type: formData.get('access_type')
            };

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // Redirect to inventory page
                    window.location.href = '/details';
                    
                } else {
                    // Show error alert
                    showAlert(result.message || 'Invalid login credentials',result.status);
                }
            } catch (error) {
                // console.error('Login error:', error);
                alert('Something went wrong. Please try again.');
            }finally {
                // Re-enable button and reset text
                addButton.disabled = false;
                addButton.textContent = "Add";
            }
    
        });

        function showAlert(message, type) {
            const alert = document.getElementsByClassName('alert')[0];
            console.log(alert)
            alert.innerText = message;
            alert.classList.remove('success', 'error', 'warning')
            alert.classList.add(type)
            alert.style.display = "block";
            setTimeout(() => {
                alert.style.display = "none";
            }, 5000)
        }
    </script>
</body>
</html>
